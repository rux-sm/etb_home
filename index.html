<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
             font-src 'self' https://fonts.gstatic.com;
             img-src 'self' data:;"
  />
  <title>ETB Home</title>
  <link rel="icon" href="./icon.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/main.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: #f8fafc;
      background: #000;
    }

    .c-header--app {
      background-color: oklch(0.2479 0.0058 271.18);
    }

    .home-minimal {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1.5rem;
      text-align: center;
      background: #000;
    }

    .home-minimal__content {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .home-minimal__grid {
      display: grid;
      grid-template-columns: repeat(2, 144px);
      gap: 1rem;
    }

    .home-minimal__tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 144px;
      height: 144px;
      gap: 0.75rem;
      padding: 1rem;
      border-radius: 18px;
      background: transparent;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease, border-color 180ms ease;
      border: 1px solid transparent;
    }

    .home-minimal__tile:hover,
    .home-minimal__tile:focus-visible {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.22);
    }

    .home-minimal__tile--placeholder {
      cursor: not-allowed;
      opacity: 0.6;
      pointer-events: none;
    }

    .home-minimal__icon-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: oklch(0.2479 0.0058 271.18);
    }

    .home-minimal__icon-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .home-minimal__label {
      display: block;
      width: 100%;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #f8fafc;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="c-header c-header--app">
      <div class="app-header__branding">
        <div class="app-header__logo-wrap">
          <img
            src="./logo.png"
            class="app-header__logo-img"
            alt="Escamilla Tour Buses"
          />
        </div>
        <h1 class="app-header__title">
          <span class="app-header__title--prefix">
            <span class="app-header__title--org">ETB</span>
            <span class="app-header__title--name">Home</span>
          </span>
        </h1>
      </div>

      <div class="c-header__actions">
        <button class="btn btn--icon" type="button" title="Menu placeholder">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </header>

    <div class="home-minimal">
      <div class="home-minimal__content">
        <div class="home-minimal__grid">
          <a href="https://rux-sm.github.io/etb-schedule/" class="home-minimal__tile" title="Open ETB schedule" target="_blank" rel="noreferrer noopener">
            <span class="home-minimal__icon-wrapper">
              <img src="./icon.png" class="home-minimal__icon-img" alt="ETB icon" />
            </span>
            <span class="home-minimal__label">Schedule</span>
          </a>

          <a href="https://docs.google.com/spreadsheets/d/1cOIWuHEeKy_Zhu4uhUpDtMhTABi-kVf5deN6b76xQ9A/edit?gid=0#gid=0" class="home-minimal__tile" title="Open Documents" target="_blank" rel="noreferrer noopener">
            <span class="home-minimal__icon-wrapper">
              <img src="./documents.png" class="home-minimal__icon-img" alt="Drivers Docs icon" />
            </span>
            <span class="home-minimal__label">Documents</span>
          </a>

          <a href="https://docs.google.com/spreadsheets/d/1kL6XiTG2RCjY4nOznEJ1urDVzm5s5muO_RFZZaqpLn0/edit?gid=33295222#gid=33295222" class="home-minimal__tile" title="Open Calculator" target="_blank" rel="noreferrer noopener">
            <span class="home-minimal__icon-wrapper">
              <img src="./calculator.icon.png" class="home-minimal__icon-img" alt="Calculator icon" />
            </span>
            <span class="home-minimal__label">Calculator</span>
          </a>

          <a href="https://rux-sm.github.io/trip-bot/" class="home-minimal__tile" title="Open TripBot" target="_blank" rel="noreferrer noopener">
            <span class="home-minimal__icon-wrapper">
              <img src="./tripbot.icon.png" class="home-minimal__icon-img" alt="TripBot icon" />
            </span>
            <span class="home-minimal__label">TripBot</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
